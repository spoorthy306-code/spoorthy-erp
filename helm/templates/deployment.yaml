apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spoorthy-erp.fullname" . }}
  labels:
    app: {{ include "spoorthy-erp.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "spoorthy-erp.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "spoorthy-erp.name" . }}
    spec:
      initContainers:
        - name: migrate-db
          image: python:3.12-slim
          command: ["sh", "-c", "pip install -r requirements.txt && python main.py"]
      containers:
        - name: api-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            limits:
              cpu: "{{ .Values.resources.limits.cpu }}"
              memory: "{{ .Values.resources.limits.memory }}"
            requests:
              cpu: "{{ .Values.resources.requests.cpu }}"
              memory: "{{ .Values.resources.requests.memory }}"
