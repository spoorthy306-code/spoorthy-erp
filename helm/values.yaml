replicaCount: 1
image:
  repository: spoorthy-erp-api
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"
ingress:
  enabled: true
  hosts:
    - host: spoorthy.local
      paths: ["/"]
  tls:
    - hosts:
        - spoorthy.local
      secretName: spoorthy-tls
