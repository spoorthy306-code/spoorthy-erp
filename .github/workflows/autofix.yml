name: Auto-Fix and Format

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-imports-and-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install black isort

      - name: Run import/type helper scripts
        run: |
          python scripts/fix_imports.py
          python scripts/add_type_hints.py

      - name: Format code
        run: |
          black backend tests scripts
          isort backend tests scripts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-fix imports and formatting"
          git push
