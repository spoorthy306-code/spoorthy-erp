name: Bundle Size Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with analyzer
        run: npm run build:analyze

      - name: Check bundle budget
        run: npm run check:bundle

      - name: Upload bundle reports
        uses: actions/upload-artifact@v4
        with:
          name: ui-react-bundle-report
          path: |
            ui/react/bundle-report.txt
            ui/react/dist/stats.html