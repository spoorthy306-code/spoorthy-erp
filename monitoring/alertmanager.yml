global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: '${SMTP_FROM:-spoorthy306@gmail.com}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'spoorthy-team'
  routes:
  - match:
      severity: critical
    receiver: 'spoorthy-critical'
    continue: true
  - match:
      severity: warning
    receiver: 'spoorthy-warning'

receivers:
- name: 'spoorthy-critical'
  webhook_configs:
  - url: 'http://api:8000/admin/alerts'
    send_resolved: true

- name: 'spoorthy-warning'
  webhook_configs:
  - url: 'http://api:8000/admin/alerts'
    send_resolved: true

- name: 'spoorthy-team'
  webhook_configs:
  - url: 'http://api:8000/admin/alerts'
    send_resolved: true
