services:
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SPOORTHY_DB_URL=${SPOORTHY_DB_URL:-sqlite:///spoorthy_erp.db}
      - AES_KEY=${AES_KEY:-0123456789abcdef0123456789abcdef}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis

  ui:
    build:
      context: ui/react
      dockerfile: Dockerfile
    ports:
      - "5173:80"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
